<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: ERG ARCHIVE</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        /* (1) 영어는 Artemis, 한글은 Pretendard 적용 */
        @font-face {
            font-family: 'Artemis';
            src: url('./Artemis.ttf') format('truetype'); /* 깃허브에 Artemis.ttf 파일을 함께 올려주세요! */
            /* 폰트 파일이 없을 경우를 대비한 대체 폰트 */
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --theme-color: #5b73d6; /* GIF에 가까운 푸른빛 네온 */
            --theme-glow: rgba(91, 115, 214, 0.4);
            --bg-color: #050810;
            --panel-bg: rgba(10, 14, 25, 0.75);
            --text-main: #d0d8e8;
            --text-muted: #6b7a99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* 폰트 적용 순서: 영어/숫자는 Artemis 먼저, 한글은 Pretendard */
            font-family: 'Artemis', 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070'); /* 임시 배경 이미지 */
            background-size: cover; background-position: center;
            color: var(--text-main); height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            backdrop-filter: brightness(0.4);
        }

        /* 메인 패널 (글래스모피즘 & 네온 테두리) */
        .mainframe {
            width: 85vw; max-width: 1100px; height: 80vh;
            background: var(--panel-bg); border: 1px solid var(--theme-color);
            border-radius: 12px; box-shadow: 0 0 30px var(--theme-glow), inset 0 0 20px var(--theme-glow);
            backdrop-filter: blur(15px); display: flex; flex-direction: column; position: relative;
        }

        /* 상단 헤더 (이름 & BGM 컨트롤) */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.5rem; border-bottom: 1px solid rgba(91, 115, 214, 0.2);
        }
        .subject-name { font-size: 0.95rem; color: var(--text-muted); letter-spacing: 1px; }
        
        /* (5) BGM 컨트롤러 */
        .bgm-controls { display: flex; align-items: center; gap: 10px; color: var(--theme-color); font-size: 0.8rem; }
        .bgm-slider { width: 80px; height: 3px; background: var(--text-muted); appearance: none; outline: none; }
        .bgm-slider::-webkit-slider-thumb { appearance: none; width: 8px; height: 8px; background: var(--theme-color); border-radius: 50%; cursor: pointer; }
        .bgm-btn { background: none; border: none; color: var(--theme-color); cursor: pointer; font-size: 1rem; }
        .bgm-btn:hover { color: #fff; text-shadow: 0 0 5px var(--theme-color); }

        /* 하단 메인 레이아웃 (사이드바 + 콘텐츠) */
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* 좌측 사이드바 */
        .sidebar {
            width: 240px; border-right: 1px solid rgba(91, 115, 214, 0.2);
            padding: 2rem 1.5rem; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
        .nav-item { color: var(--text-muted); font-size: 0.95rem; cursor: pointer; transition: 0.2s; letter-spacing: 1px; }
        .nav-item:hover, .nav-item.active { color: var(--theme-color); font-weight: bold; text-shadow: 0 0 8px var(--theme-glow); }

        /* (7) 캘린더 대신 이미지 & 시스템 정보 */
        .bottom-info { text-align: center; }
        .sidebar-img { width: 100%; height: 100px; background: #000; border: 1px solid var(--theme-glow); margin-bottom: 1rem; object-fit: cover; border-radius: 4px; }
        .sys-time { border: 1px dashed var(--theme-glow); padding: 0.5rem; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem; letter-spacing: 2px; }
        
        /* (4) 로그인 버튼 */
        .login-btn { width: 100%; padding: 0.5rem; background: transparent; color: var(--theme-color); border: 1px solid var(--theme-color); border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; transition: 0.3s; }
        .login-btn:hover { background: var(--theme-color); color: #000; }

        /* 우측 콘텐츠 영역 */
        .content-area { flex: 1; padding: 2rem 3rem; overflow-y: auto; display: flex; flex-direction: column; }

        /* 아카이브 필터 메뉴 */
        .filter-menu { display: flex; gap: 1.5rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
        .filter-item { color: var(--text-muted); font-size: 0.85rem; cursor: pointer; }
        .filter-item.active { color: var(--theme-color); }

        /* 아카이브 리스트 (GIF UI 반영) */
        .post-list { display: flex; flex-direction: column; }
        .post-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 1.5rem 0; position: relative; }
        .post-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .post-title { font-size: 1.2rem; color: #fff; margin-bottom: 0.5rem; font-weight: normal; }
        .post-excerpt { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }
        
        /* 관리자 전용 삭제 버튼 */
        .admin-controls { position: absolute; right: 0; top: 1.5rem; display: none; }
        .is-admin .admin-controls { display: block; }
        .del-btn { background: transparent; border: 1px solid #ff4a4a; color: #ff4a4a; padding: 0.2rem 0.5rem; font-size: 0.7rem; cursor: pointer; border-radius: 3px; }

        /* 새 글 쓰기 UI (관리자 전용) */
        .write-section { display: none; background: rgba(0,0,0,0.3); padding: 1.5rem; border: 1px solid var(--theme-glow); border-radius: 8px; margin-bottom: 2rem; }
        .is-admin .write-section { display: block; }
        .write-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--theme-glow); color: #fff; font-family: inherit; font-size: 1rem; padding: 0.5rem; margin-bottom: 1rem; outline: none; }
        .write-textarea { width: 100%; height: 80px; background: rgba(0,0,0,0.2); border: 1px solid var(--theme-glow); color: #fff; font-family: inherit; font-size: 0.9rem; padding: 0.5rem; margin-bottom: 1rem; outline: none; resize: none; }
        .submit-btn { padding: 0.5rem 1.5rem; background: var(--theme-color); color: #000; border: none; cursor: pointer; font-family: inherit; border-radius: 3px; }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--theme-glow); border-radius: 3px; }
    </style>
</head>
<body>

    <audio id="bgm" src="YOUR_BGM_FILE.mp3" loop></audio>

    <div class="mainframe">
        <header class="top-bar">
            <div class="subject-name">실험체: 혜레</div>
            <div class="bgm-controls">
                <span>BGM</span>
                <input type="range" class="bgm-slider" id="bgm-vol" min="0" max="1" step="0.01" value="0.5">
                <button class="bgm-btn" id="bgm-prev">⏮</button>
                <button class="bgm-btn" id="bgm-play">▶</button>
                <button class="bgm-btn" id="bgm-next">⏭</button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <nav class="nav-menu">
                    <div class="nav-item">HOME</div>
                    <div class="nav-item active">ARCHIVE</div>
                    <div class="nav-item">TRPG LOG</div>
                    <div class="nav-item">GALLERY</div>
                    <div class="nav-item">GUESTBOOK</div>
                </nav>

                <div class="bottom-info">
                    <img src="https://via.placeholder.com/200x100/0a0e19/5b73d6?text=IMAGE_SLOT" class="sidebar-img" alt="Sidebar Img">
                    <div class="sys-time">
                        [ SYSTEM TIME ]<br>
                        <span id="clock">00 : 00 : 00</span>
                    </div>
                    <button class="login-btn" id="auth-btn" onclick="handleLogin()">LOGIN</button>
                </div>
            </aside>

            <main class="content-area">
                <div class="filter-menu">
                    <div class="filter-item active">ALL</div>
                    <div class="filter-item">엘백도</div>
                    <div class="filter-item">태칸</div>
                    <div class="filter-item">메이레스</div>
                </div>

                <div class="write-section">
                    <input type="text" id="post-category" class="write-input" placeholder="카테고리/작성자 (예: 엘백도/글)" style="width: 48%;">
                    <input type="date" id="post-date" class="write-input" style="width: 48%; float:right;">
                    <input type="text" id="post-title" class="write-input" placeholder="제목을 입력하세요">
                    <textarea id="post-content" class="write-textarea" placeholder="내용 요약을 입력하세요..."></textarea>
                    <button class="submit-btn" onclick="savePost()">POST RECORD</button>
                </div>

                <div class="post-list" id="post-container">
                    <div style="color:var(--text-muted); text-align:center; padding: 2rem;">
                        데이터를 동기화 중입니다...
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ==========================================
        // [필수] 파이어베이스 설정값 입력 공간
        // 파이어베이스 콘솔 -> 프로젝트 설정 -> 내 앱 -> SDK 설정 및 구성에서 복사해서 덮어쓰세요!
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // 파이어베이스 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ==========================================
        // 1. 실시간 데이터베이스 (Firestore) 불러오기
        // ==========================================
        const postContainer = document.getElementById('post-container');

        // db.collection('archive').orderBy('date', 'desc').onSnapshot() 을 통해 실시간으로 데이터를 가져옵니다.
        db.collection("archive").orderBy("date", "desc").onSnapshot((snapshot) => {
            postContainer.innerHTML = ''; // 기존 목록 초기화
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // HTML 동적 생성
                const postHTML = `
                    <div class="post-item">
                        <div class="post-meta">
                            <span>${data.category}</span>
                            <span>${data.date}</span>
                        </div>
                        <h3 class="post-title">${data.title}</h3>
                        <p class="post-excerpt">${data.content}</p>
                        <div class="admin-controls">
                            <button class="del-btn" onclick="deletePost('${doc.id}')">삭제</button>
                        </div>
                    </div>
                `;
                postContainer.innerHTML += postHTML;
            });
        }, (error) => {
            console.error("Firebase 읽기 오류 (설정이 안되었거나 권한이 없습니다):", error);
            postContainer.innerHTML = `<div style="color:#ff4a4a; padding: 2rem;">데이터베이스 연결이 필요합니다.<br>Firebase 설정을 확인하세요.</div>`;
        });

        // ==========================================
        // 2. 새 글 작성 (Firestore 저장)
        // ==========================================
        function savePost() {
            const category = document.getElementById('post-category').value;
            const date = document.getElementById('post-date').value;
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;

            if(!title || !content) return alert("제목과 내용을 입력하세요.");

            db.collection("archive").add({
                category: category || "기록",
                date: date || new Date().toISOString().split('T')[0],
                title: title,
                content: content,
                timestamp: firebase.firestore.FieldValue.serverTimestamp() // 정렬을 위한 타임스탬프
            }).then(() => {
                // 입력폼 초기화
                document.getElementById('post-title').value = '';
                document.getElementById('post-content').value = '';
            }).catch((error) => {
                alert("작성 실패: " + error.message);
            });
        }

        // ==========================================
        // 3. 글 삭제
        // ==========================================
        function deletePost(docId) {
            if(confirm("이 기록을 삭제하시겠습니까?")) {
                db.collection("archive").doc(docId).delete();
            }
        }

        // ==========================================
        // 4. 로그인 / 인증 시스템
        // ==========================================
        const authBtn = document.getElementById('auth-btn');

        // 인증 상태 감지기 (로그인/로그아웃 시 자동 실행)
        auth.onAuthStateChanged((user) => {
            if (user) {
                // 로그인 된 상태
                document.body.classList.add('is-admin');
                authBtn.innerText = "LOGOUT";
            } else {
                // 로그아웃 된 상태
                document.body.classList.remove('is-admin');
                authBtn.innerText = "LOGIN";
            }
        });

        function handleLogin() {
            if (auth.currentUser) {
                // 로그아웃 실행
                auth.signOut();
            } else {
                // 로그인 실행 (이메일/비밀번호 방식)
                const email = prompt("관리자 이메일을 입력하세요:");
                const pwd = prompt("비밀번호를 입력하세요:");
                if(email && pwd) {
                    auth.signInWithEmailAndPassword(email, pwd)
                        .catch((error) => alert("로그인 실패: " + error.message));
                }
            }
        }

        // ==========================================
        // 5. 부가 기능 (시계, BGM)
        // ==========================================
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = 
                `${String(now.getHours()).padStart(2, '0')} : ${String(now.getMinutes()).padStart(2, '0')} : ${String(now.getSeconds()).padStart(2, '0')}`;
        }, 1000);

        // BGM 컨트롤
        const bgm = document.getElementById('bgm');
        const playBtn = document.getElementById('bgm-play');
        const volSlider = document.getElementById('bgm-vol');
        let isPlaying = false;

        playBtn.onclick = () => {
            if(isPlaying) { bgm.pause(); playBtn.innerText = "▶"; } 
            else { bgm.play(); playBtn.innerText = "⏸"; }
            isPlaying = !isPlaying;
        };

        volSlider.oninput = (e) => { bgm.volume = e.target.value; };

    </script>
</body>
</html>
